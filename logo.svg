<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-labelledby="tuLogoTitle">
  <title id="tuLogoTitle">Truth Unveiled Ministries monogram</title>
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0D28C"/>
      <stop offset="100%" stop-color="#D4A537"/>
    </linearGradient>
    <linearGradient id="purpGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5A3FA6"/>
      <stop offset="100%" stop-color="#2E1F5E"/>
    </linearGradient>
