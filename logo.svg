  <circle cx="100" cy="100" r="96" fill="#0A0A0C" stroke="url(#goldGrad)" stroke-width="3"/>
  <circle cx="100" cy="100" r="82" fill="none" stroke="url(#purpGrad)" stroke-width="1.5" opacity="0.6"/>
  <text x="100" y="127" text-anchor="middle" font-family="'Fraunces', 'Georgia', serif" font-size="82" font-weight="600" fill="url(#goldGrad)">T</text>
  <text x="128" y="140" text-anchor="middle" font-family="'Fraunces', 'Georgia', serif" font-size="56" font-weight="600" fill="url(#purpGrad)">U</text>
</svg>
